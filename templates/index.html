<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
.header { background: #1677ff; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; }
.header button { padding: 6px 14px; background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; cursor: pointer; font-size: 13px; }
.header button:hover { background: rgba(255,255,255,0.35); }
.container { max-width: 960px; margin: 16px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 6px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; margin-bottom: 12px; border-bottom: 2px solid #1677ff; padding-bottom: 6px; }
.form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.form-row label { min-width: 60px; line-height: 32px; font-size: 13px; color: #555; }
.form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 150px; padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 13px; }
.form-row textarea { min-height: 56px; resize: vertical; }
.form-row button { padding: 7px 20px; background: #1677ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
.form-row button:hover { background: #4096ff; }
.msg { padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; display: none; }
.msg.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; }
.msg.error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }
.task-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.task-item:last-child { border-bottom: none; }
.task-item.completed { opacity: 0.55; }
.task-item.completed .task-content { text-decoration: line-through; }
.task-info { flex: 1; }
.task-content { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-meta { color: #888; font-size: 12px; line-height: 1.6; }
.task-meta span { margin-right: 12px; }
.task-actions button { padding: 4px 10px; background: #ff4d4f; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
.task-actions button:hover { background: #ff7875; }
.empty { text-align: center; color: #999; padding: 20px; font-size: 13px; }
.hint { color: #999; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
<h1>任务管理</h1>
<form method="POST" action="/logout" style="margin:0">
<button type="submit">退出登录</button>
</form>
</div>
<div class="container">
<div id="msg" class="msg"></div>
<div class="card">
<h2>创建任务</h2>
<div class="form-row">
<label>类型</label>
<select id="task_type">
<option value="user">用户</option>
<option value="group">群组</option>
</select>
<label>target_id</label>
<input id="target_id" placeholder="用户/群组 ID">
</div>
<div class="form-row">
<label>umo</label>
<input id="umo" placeholder="session_id（群组必填，含平台前缀）">
<label>提醒时间</label>
<input id="task_time" type="datetime-local">
</div>
<div class="form-row">
<label>内容</label>
<textarea id="task_content" placeholder="提醒内容"></textarea>
</div>
<div class="form-row">
<span class="hint">群组任务必须填写完整 session_id（umo），格式如 aiocqhttp:GroupMessage:123456</span>
</div>
<div class="form-row">
<button type="button" id="create_btn">创建任务</button>
</div>
</div>
<div class="card">
<h2>用户任务</h2>
<div id="user_tasks"><div class="empty">加载中...</div></div>
</div>
<div class="card">
<h2>群组任务</h2>
<div id="group_tasks"><div class="empty">加载中...</div></div>
</div>
</div>
<script>
const msgEl = document.getElementById("msg");

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = "msg " + type;
  msgEl.style.display = "block";
  setTimeout(function () { msgEl.style.display = "none"; }, 4000);
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function loadTasks() {
  try {
    const r = await fetch("/api/tasks");
    if (r.status === 401) { window.location.href = "/login"; return; }
    const d = await r.json();
    renderList("user_tasks", d.user_tasks || [], "user");
    renderList("group_tasks", d.group_tasks || [], "group");
  } catch (e) {
    showMsg("加载失败: " + e.message, "error");
  }
}

function renderList(elId, tasks, type) {
  const el = document.getElementById(elId);
  if (!tasks.length) { el.innerHTML = `<div class="empty">暂无任务</div>`; return; }
  let h = "";
  for (const t of tasks) {
    const cls = t.completed ? " completed" : "";
    h += `<div class="task-item${cls}">`;
    h += `<div class="task-info">`;
    h += `<div class="task-content">${esc(t.content)}</div>`;
    h += `<div class="task-meta">`;
    h += `<span>ID: ${esc(t.task_id || "")}</span>`;
    h += `<span>类型: ${esc(t.type)}</span>`;
    h += `<span>target: ${esc(t.target_id || "")}</span>`;
    if (t.umo) h += `<span>umo: ${esc(t.umo)}</span>`;
    h += `<span>时间: ${esc(t.time)}</span>`;
    h += `<span>${t.completed ? "已完成" : "待提醒"}</span>`;
    if (t.creator) h += `<span>创建者: ${esc(t.creator)}</span>`;
    h += `</div></div>`;
    h += `<div class="task-actions"><button data-task-id="${esc(t.task_id)}">删除</button></div>`;
    h += `</div>`;
  }
  el.innerHTML = h;
}

async function createTask() {
  const type = document.getElementById("task_type").value;
  const target_id = document.getElementById("target_id").value.trim();
  const umo = document.getElementById("umo").value.trim();
  const time = document.getElementById("task_time").value;
  const content = document.getElementById("task_content").value.trim();
  if (!target_id || !content || !time) { showMsg("请填写 target_id、内容和时间", "error"); return; }
  try {
    const r = await fetch("/api/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: type, target_id: target_id, umo: umo, time: time, content: content })
    });
    const d = await r.json();
    if (d.success) { showMsg(d.message, "success"); loadTasks(); }
    else { showMsg(d.message, "error"); }
  } catch (e) { showMsg("创建失败: " + e.message, "error"); }
}

async function deleteTask(id) {
  if (!confirm("确认删除任务 " + id + " ？")) return;
  try {
    const r = await fetch("/api/tasks/" + encodeURIComponent(id), { method: "DELETE" });
    const d = await r.json();
    if (d.success) { showMsg(d.message, "success"); loadTasks(); }
    else { showMsg(d.message, "error"); }
  } catch (e) { showMsg("删除失败: " + e.message, "error"); }
}

document.addEventListener("click", function (e) {
  const el = e.target.closest ? e.target : e.target.parentElement;
  const b = el && el.closest("button[data-task-id]");
  if (b) { deleteTask(b.dataset.taskId); }
});

document.getElementById("create_btn").addEventListener("click", createTask);
loadTasks();
</script>
</body>
</html>
