<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 任务管理</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 320px; }
.login-box h1 { text-align: center; color: #333; margin-bottom: 24px; font-size: 22px; }
.login-box input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
.login-box button { width: 100%; margin-top: 16px; padding: 10px; background: #1677ff; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
.login-box button:hover { background: #4096ff; }
.error { color: #ff4d4f; text-align: center; margin-bottom: 12px; font-size: 14px; }
</style>
</head>
<body>
<div class="login-box">
<h1>任务管理</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
<input type="password" name="key" placeholder="请输入登录密钥" required autofocus>
<button type="submit">登录</button>
</form>
</div>
</body>
</html>
